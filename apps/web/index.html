<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#161616" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#161616" />
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <script>
      (() => {
        const LIGHT_BACKGROUND = "#ffffff";
        const DARK_BACKGROUND = "#161616";
        const ARK_BACKGROUND = "#120d07";
        const themeColorMeta = document.querySelector('meta[name="theme-color"]');
        try {
          const storedTheme = window.localStorage.getItem("t3code:theme");
          const theme =
            storedTheme === "light" ||
            storedTheme === "dark" ||
            storedTheme === "system" ||
            storedTheme === "ark"
              ? storedTheme
              : "system";
          const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          const isDark = theme === "ark" || theme === "dark" || (theme === "system" && prefersDark);
          document.documentElement.classList.toggle("dark", isDark);
          document.documentElement.classList.toggle("ark", theme === "ark");
          const chromeColor =
            theme === "ark" ? ARK_BACKGROUND : isDark ? DARK_BACKGROUND : LIGHT_BACKGROUND;
          document.documentElement.style.backgroundColor = chromeColor;
          themeColorMeta?.setAttribute("content", chromeColor);
        } catch {
          document.documentElement.classList.add("dark");
          document.documentElement.style.backgroundColor = DARK_BACKGROUND;
          themeColorMeta?.setAttribute("content", DARK_BACKGROUND);
        }
      })();
    </script>
    <style>
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        background: #ffffff;
        color: #262626;
        font-family:
          "DM Sans Variable",
          "DM Sans",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          system-ui,
          sans-serif;
      }

      html.dark body {
        background: #161616;
        color: #f5f5f5;
      }

      html.ark body {
        background: #120d07;
        color: #ffd89a;
      }

      #boot-shell {
        display: flex;
        position: relative;
        min-height: 100%;
        align-items: center;
        justify-content: center;
        background: inherit;
        overflow: hidden;
      }

      html.ark #boot-shell::before {
        content: "";
        position: absolute;
        inset: 0;
        opacity: 0.18;
        background: repeating-linear-gradient(
          to bottom,
          rgb(255 204 130 / 0.2) 0,
          rgb(255 204 130 / 0.2) 1px,
          transparent 1px,
          transparent 5px
        );
        animation: boot-scanlines 18s linear infinite;
      }

      html.ark #boot-shell::after {
        content: "";
        position: absolute;
        inset: -12%;
        background:
          radial-gradient(ellipse at 50% 45%, rgb(255 179 71 / 0.16), transparent 48%),
          radial-gradient(ellipse at 50% 50%, transparent 58%, rgb(0 0 0 / 0.48) 100%);
      }

      #boot-shell-mark {
        display: flex;
        position: relative;
        z-index: 1;
        align-items: center;
        justify-content: center;
        width: 9rem;
        height: 4.5rem;
        color: inherit;
        font-weight: 700;
        font-size: 1.35rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      html.ark #boot-shell-mark {
        border-radius: 18px;
        background: rgb(255 179 71 / 0.08);
        box-shadow:
          0 0 36px rgb(255 179 71 / 0.18),
          inset 0 0 28px rgb(255 179 71 / 0.1);
        text-shadow:
          0 0 0.45em rgb(255 179 71 / 0.45),
          0 0 1.2em rgb(255 179 71 / 0.2);
      }

      @keyframes boot-scanlines {
        from {
          background-position-y: 0;
        }
        to {
          background-position-y: 80px;
        }
      }
    </style>
    <title>Ark (Alpha)</title>
  </head>
  <body>
    <div id="root">
      <div id="boot-shell">
        <div id="boot-shell-mark" aria-label="Ark splash screen">Ark</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
