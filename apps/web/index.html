<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#161616" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#161616" />
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <script>
      (() => {
        const LIGHT_BACKGROUND = "#ffffff";
        const DARK_BACKGROUND = "#161616";
        const ARK_BACKGROUND = "#120d07";
        const themeColorMeta = document.querySelector('meta[name="theme-color"]');
        try {
          const storedTheme = window.localStorage.getItem("t3code:theme");
          const theme =
            storedTheme === "light" ||
            storedTheme === "dark" ||
            storedTheme === "system" ||
            storedTheme === "ark"
              ? storedTheme
              : "system";
          const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          const isDark = theme === "ark" || theme === "dark" || (theme === "system" && prefersDark);
          document.documentElement.classList.toggle("dark", isDark);
          document.documentElement.classList.toggle("ark", theme === "ark");
          const chromeColor =
            theme === "ark" ? ARK_BACKGROUND : isDark ? DARK_BACKGROUND : LIGHT_BACKGROUND;
          document.documentElement.style.backgroundColor = chromeColor;
          themeColorMeta?.setAttribute("content", chromeColor);
        } catch {
          document.documentElement.classList.add("dark");
          document.documentElement.style.backgroundColor = DARK_BACKGROUND;
          themeColorMeta?.setAttribute("content", DARK_BACKGROUND);
        }
      })();
    </script>
    <style>
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        background: #ffffff;
        color: #262626;
        font-family:
          "DM Sans Variable",
          "DM Sans",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          system-ui,
          sans-serif;
      }

      html.dark body {
        background: #161616;
        color: #f5f5f5;
      }

      html.ark body {
        background:
          linear-gradient(
            115deg,
            rgb(255 176 47 / 0.04),
            transparent 30%,
            rgb(198 107 17 / 0.025) 68%,
            transparent
          ),
          repeating-linear-gradient(87deg, rgb(255 176 47 / 0.018) 0 1px, transparent 1px 29px),
          repeating-linear-gradient(0deg, rgb(0 0 0 / 0.16) 0 2px, transparent 2px 6px), #050402;
        color: #ffefc2;
        text-shadow: 0 0 6px rgb(255 176 47 / 0.16);
      }

      #boot-shell {
        display: flex;
        position: relative;
        min-height: 100%;
        align-items: center;
        justify-content: center;
        background: inherit;
        overflow: hidden;
      }

      html.ark #boot-shell::before {
        content: "";
        position: absolute;
        inset: 0;
        opacity: 0.62;
        background:
          repeating-linear-gradient(180deg, rgb(255 232 170 / 0.105) 0 2px, transparent 2px 6px),
          repeating-linear-gradient(
            94deg,
            transparent 0 13px,
            rgb(255 176 47 / 0.035) 13px 14px,
            transparent 14px 47px
          ),
          repeating-linear-gradient(
            37deg,
            transparent 0 21px,
            rgb(0 0 0 / 0.22) 21px 22px,
            transparent 22px 61px
          ),
          linear-gradient(180deg, rgb(255 176 47 / 0.05), rgb(0 0 0 / 0.1));
        animation: boot-scanlines 18s ease-in-out infinite;
        mix-blend-mode: overlay;
      }

      html.ark #boot-shell::after {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(
            ellipse at center,
            rgb(255 236 184 / 0.045),
            transparent 52%,
            rgb(0 0 0 / 0.1) 86%,
            rgb(0 0 0 / 0.24) 100%
          ),
          linear-gradient(90deg, rgb(255 0 0 / 0.025), rgb(0 255 0 / 0.018), rgb(0 0 255 / 0.025));
        box-shadow: inset 0 0 42px rgb(0 0 0 / 0.46);
      }

      #boot-shell-mark {
        display: flex;
        position: relative;
        z-index: 1;
        align-items: center;
        justify-content: center;
        width: 9rem;
        height: 4.5rem;
        color: inherit;
        font-weight: 700;
        font-size: 1.35rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      html.ark #boot-shell-mark {
        border-radius: 8px;
        background: #0c0905;
        box-shadow:
          0 0 0 1px rgb(255 176 47 / 0.08),
          0 18px 48px rgb(0 0 0 / 0.72);
        text-shadow: 0 0 6px rgb(255 176 47 / 0.16);
      }

      @keyframes boot-scanlines {
        0%,
        100% {
          background-position:
            0 0,
            0 0,
            0 0,
            0 0;
        }
        45% {
          background-position:
            0 -10px,
            3px 0,
            -2px 4px,
            0 0;
        }
        72% {
          background-position:
            0 7px,
            -2px 0,
            2px -3px,
            0 0;
        }
      }
    </style>
    <title>Ark</title>
  </head>
  <body>
    <div id="root">
      <div id="boot-shell">
        <div id="boot-shell-mark" aria-label="Ark splash screen">Ark</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
